name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# 같은 브랜치에서 새 커밋이 오면 이전 실행은 취소(자원 절약)
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # packageManager 필드(pnpm@10.x)를 그대로 사용

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test
